name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Root Rust crate (the reader)
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # PyO3 binding crate (standalone workspace; abi3 builds without a Python
      # interpreter, so a plain check/clippy validates it headlessly)
      - run: cargo fmt --manifest-path python/Cargo.toml --check
      - run: cargo clippy --manifest-path python/Cargo.toml --all-targets -- -D warnings

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      # Build the wheel via the maturin build backend and install it. (Unlike
      # `maturin develop`, this needs no active virtualenv.)
      - run: pip install ./python
      - name: Verify type stubs are bundled in the wheel
        # maturin packages a pure-Rust project's <module>.pyi as the package's
        # __init__.pyi alongside py.typed.
        run: python -c "import pathlib,species_range_index as m; p=pathlib.Path(m.__file__).parent; assert (p/'py.typed').exists(), 'missing py.typed'; assert (p/'__init__.pyi').exists() or (p/'species_range_index.pyi').exists(), sorted(x.name for x in p.iterdir())"
      - run: pytest python/tests/ -v
